<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Definições -->
  <defs>
    <!-- Gradientes -->
    <linearGradient id="gradWindows" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradDB2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#054ADA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradComponent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F0F0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0D0D0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradAgent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#28A745;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E7E34;stop-opacity:1" />
    </linearGradient>
    
    <!-- Sombra -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Marcador de seta -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#28A745" />
    </marker>
  </defs>
  
  <!-- Fundo -->
  <rect width="1400" height="1000" fill="#FAFAFA"/>
  
  <!-- Título -->
  <text x="700" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">
    IBM InfoSphere Data Replication - Arquitetura CDC Simplificada
  </text>
  <text x="700" y="55" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#666">
    Management Console + Access Server em Windows | Agentes co-localizados com bancos de dados
  </text>
  
  <!-- Camada de Gerenciamento e Controle -->
  <rect x="50" y="80" width="1300" height="200" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="5,5" rx="10"/>
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#666">
    CAMADA DE GERENCIAMENTO E CONTROLE
  </text>
  
  <!-- Management Console + Access Server (Windows) -->
  <g filter="url(#shadow)">
    <rect x="400" y="120" width="600" height="140" fill="url(#gradWindows)" stroke="#003D99" stroke-width="2" rx="8"/>
    <text x="700" y="145" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      🖥️ Máquina Windows
    </text>
    
    <!-- Management Console -->
    <rect x="420" y="160" width="270" height="80" fill="url(#gradComponent)" stroke="#666" stroke-width="1" rx="5"/>
    <text x="555" y="180" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">
      Management Console
    </text>
    <text x="430" y="200" font-family="Arial, sans-serif" font-size="10" fill="#333">
      • Interface Web (Porta 11701)
    </text>
    <text x="430" y="215" font-family="Arial, sans-serif" font-size="10" fill="#333">
      • Configuração de subscrições
    </text>
    <text x="430" y="230" font-family="Arial, sans-serif" font-size="10" fill="#333">
      • Monitoramento e dashboards
    </text>
    
    <!-- Access Server -->
    <rect x="710" y="160" width="270" height="80" fill="url(#gradComponent)" stroke="#666" stroke-width="1" rx="5"/>
    <text x="845" y="180" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">
      Access Server
    </text>
    <text x="720" y="200" font-family="Arial, sans-serif" font-size="10" fill="#333">
      • Controle central (Porta 10101)
    </text>
    <text x="720" y="215" font-family="Arial, sans-serif" font-size="10" fill="#333">
      • Gerenciamento de agentes
    </text>
    <text x="720" y="230" font-family="Arial, sans-serif" font-size="10" fill="#333">
      • Roteamento de metadados
    </text>
  </g>
  
  <!-- Setas para os agentes -->
  <line x1="555" y1="260" x2="280" y2="360" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="380" y="310" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">
    Porta 11001
  </text>
  <text x="380" y="325" font-family="Arial, sans-serif" font-size="10" fill="#666">
    Controle Capture
  </text>
  
  <line x1="845" y1="260" x2="1120" y2="360" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="1000" y="310" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">
    Porta 11101
  </text>
  <text x="1000" y="325" font-family="Arial, sans-serif" font-size="10" fill="#666">
    Controle Apply
  </text>
  
  <!-- Camada de Dados e Agentes -->
  <rect x="50" y="350" width="1300" height="480" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="5,5" rx="10"/>
  <text x="60" y="370" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#666">
    CAMADA DE DADOS E AGENTES CDC
  </text>
  
  <!-- Servidor Source (DB2 + Capture Agent) -->
  <g filter="url(#shadow)">
    <rect x="80" y="390" width="500" height="410" fill="url(#gradDB2)" stroke="#003D99" stroke-width="3" rx="8"/>
    <text x="330" y="420" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      🖥️ Servidor SOURCE
    </text>
    
    <!-- Capture Agent -->
    <rect x="100" y="440" width="460" height="100" fill="url(#gradAgent)" stroke="#1E7E34" stroke-width="2" rx="5"/>
    <text x="330" y="465" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">
      Capture Agent (Porta 11001)
    </text>
    <text x="110" y="485" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Lê transaction logs do banco de dados
    </text>
    <text x="110" y="500" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Captura operações CDC (INSERT/UPDATE/DELETE)
    </text>
    <text x="110" y="515" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Staging area local para buffer de transações
    </text>
    <text x="110" y="530" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Envia dados para Apply Agent
    </text>
    
    <!-- Seta interna -->
    <line x1="330" y1="540" x2="330" y2="570" stroke="white" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- DB2 Source -->
    <rect x="100" y="580" width="460" height="200" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2" rx="5"/>
    <text x="330" y="605" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      💾 Banco de Dados SOURCE
    </text>
    <text x="330" y="625" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="white">
      DB2 / PostgreSQL / MySQL
    </text>
    
    <text x="110" y="650" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Tabelas de produção (schemas origem)
    </text>
    <text x="110" y="665" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Transaction Logs (Active + Archive)
    </text>
    <text x="110" y="680" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Log Archiving habilitado
    </text>
    <text x="110" y="695" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Usuário CDC: cdccapture
    </text>
    
    <rect x="110" y="710" width="440" height="55" fill="rgba(0,0,0,0.2)" stroke="white" stroke-width="1" rx="3"/>
    <text x="120" y="728" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">
      Requisitos do Servidor:
    </text>
    <text x="120" y="743" font-family="Arial, sans-serif" font-size="9" fill="white">
      • Linux/Windows com DB2/PostgreSQL/MySQL instalado
    </text>
    <text x="120" y="756" font-family="Arial, sans-serif" font-size="9" fill="white">
      • Espaço para logs e staging (100-200 GB)
    </text>
  </g>
  
  <!-- Servidor Target (DB2 + Apply Agent) -->
  <g filter="url(#shadow)">
    <rect x="820" y="390" width="500" height="410" fill="url(#gradDB2)" stroke="#003D99" stroke-width="3" rx="8"/>
    <text x="1070" y="420" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
      🖥️ Servidor TARGET
    </text>
    
    <!-- Apply Agent -->
    <rect x="840" y="440" width="460" height="100" fill="url(#gradAgent)" stroke="#1E7E34" stroke-width="2" rx="5"/>
    <text x="1070" y="465" font-family="Arial, sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="white">
      Apply Agent (Porta 11101)
    </text>
    <text x="850" y="485" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Recebe dados do Capture Agent
    </text>
    <text x="850" y="500" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Transforma e mapeia dados
    </text>
    <text x="850" y="515" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Resolve conflitos e aplica mudanças
    </text>
    <text x="850" y="530" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Mantém tabelas de controle de replicação
    </text>
    
    <!-- Seta interna -->
    <line x1="1070" y1="540" x2="1070" y2="570" stroke="white" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <!-- DB2 Target -->
    <rect x="840" y="580" width="460" height="200" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2" rx="5"/>
    <text x="1070" y="605" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
      💾 Banco de Dados TARGET
    </text>
    <text x="1070" y="625" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="white">
      DB2 / PostgreSQL / MySQL
    </text>
    
    <text x="850" y="650" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Tabelas replicadas (schemas destino)
    </text>
    <text x="850" y="665" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Replication Control Tables
    </text>
    <text x="850" y="680" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Metadata e Bookmarks
    </text>
    <text x="850" y="695" font-family="Arial, sans-serif" font-size="11" fill="white">
      • Usuário CDC: cdcapply
    </text>
    
    <rect x="850" y="710" width="440" height="55" fill="rgba(0,0,0,0.2)" stroke="white" stroke-width="1" rx="3"/>
    <text x="860" y="728" font-family="Arial, sans-serif" font-size="10" fill="white" font-weight="bold">
      Requisitos do Servidor:
    </text>
    <text x="860" y="743" font-family="Arial, sans-serif" font-size="9" fill="white">
      • Linux/Windows com DB2/PostgreSQL/MySQL instalado
    </text>
    <text x="860" y="756" font-family="Arial, sans-serif" font-size="9" fill="white">
      • Espaço para tabelas replicadas e controle
    </text>
  </g>
  
  <!-- Fluxo de dados CDC entre agentes -->
  <g>
    <line x1="560" y1="490" x2="840" y2="490" stroke="#FF6600" stroke-width="5" marker-end="url(#arrowhead)"/>
    <text x="700" y="475" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#FF6600">
      Fluxo de Dados CDC
    </text>
    <text x="700" y="510" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">
      Transações capturadas → Staging → Aplicação
    </text>
  </g>
  
  <!-- Tabela de Portas por Banco de Dados -->
  <g>
    <rect x="50" y="850" width="1300" height="130" fill="#F5F5F5" stroke="#999" stroke-width="2" rx="8"/>
    <text x="700" y="875" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">
      📋 PORTAS PADRÃO DOS BANCOS DE DADOS
    </text>
    
    <!-- Cabeçalho da tabela -->
    <rect x="70" y="890" width="1260" height="25" fill="#0078D4" rx="3"/>
    <text x="200" y="907" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      Banco de Dados
    </text>
    <text x="500" y="907" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      Porta Padrão
    </text>
    <text x="750" y="907" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      Protocolo
    </text>
    <text x="1000" y="907" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
      Observações
    </text>
    
    <!-- Linha DB2 -->
    <rect x="70" y="915" width="1260" height="20" fill="white"/>
    <text x="200" y="929" font-family="Arial, sans-serif" font-size="10" fill="#333">
      IBM DB2
    </text>
    <text x="500" y="929" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">
      50000
    </text>
    <text x="750" y="929" font-family="Arial, sans-serif" font-size="10" fill="#333">
      TCP
    </text>
    <text x="1000" y="929" font-family="Arial, sans-serif" font-size="9" fill="#666">
      Porta configurável no DB2 Configuration Manager
    </text>
    
    <!-- Linha PostgreSQL -->
    <rect x="70" y="935" width="1260" height="20" fill="#F9F9F9"/>
    <text x="200" y="949" font-family="Arial, sans-serif" font-size="10" fill="#333">
      PostgreSQL
    </text>
    <text x="500" y="949" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">
      5432
    </text>
    <text x="750" y="949" font-family="Arial, sans-serif" font-size="10" fill="#333">
      TCP
    </text>
    <text x="1000" y="949" font-family="Arial, sans-serif" font-size="9" fill="#666">
      Porta configurável no postgresql.conf
    </text>
    
    <!-- Linha MySQL -->
    <rect x="70" y="955" width="1260" height="20" fill="white"/>
    <text x="200" y="969" font-family="Arial, sans-serif" font-size="10" fill="#333">
      MySQL / MariaDB
    </text>
    <text x="500" y="969" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">
      3306
    </text>
    <text x="750" y="969" font-family="Arial, sans-serif" font-size="10" fill="#333">
      TCP
    </text>
    <text x="1000" y="969" font-family="Arial, sans-serif" font-size="9" fill="#666">
      Porta configurável no my.cnf ou my.ini
    </text>
  </g>
  
  <!-- Nota importante -->
  <g>
    <text x="70" y="995" font-family="Arial, sans-serif" font-size="10" fill="#333">
      <tspan font-weight="bold">⚠️ IMPORTANTE:</tspan> Os agentes CDC (Capture e Apply) devem ter conectividade de rede com seus respectivos bancos de dados nas portas acima.
    </text>
    <text x="70" y="1010" font-family="Arial, sans-serif" font-size="10" fill="#333">
      Certifique-se de que os firewalls locais e de rede permitam comunicação entre: Management Console ↔ Agentes (portas 11001/11101) e Agentes ↔ Bancos de Dados.
    </text>
  </g>
  
</svg>

